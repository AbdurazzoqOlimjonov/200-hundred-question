<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Medical English Quiz — 194 Questions</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="header">
			<div class="logo">🩺 Medical English</div>
			<div class="score-box">
				<span>✓ <span class="correct" id="sc">0</span></span>
				<span>✗ <span class="wrong" id="sw">0</span></span>
			</div>
		</div>

		<div class="progress-wrap">
			<div class="progress-info">
				<span id="prog-text">Question 1 of 194</span>
				<span id="pct">0%</span>
			</div>
			<div class="progress-bar">
				<div class="progress-fill" id="prog-fill" style="width: 0%"></div>
			</div>
		</div>

		<!-- ECG decoration -->
		<div class="ecg">
			<svg viewBox="0 0 800 36" fill="none" xmlns="http://www.w3.org/2000/svg">
				<polyline
					points="0,18 80,18 100,4 110,30 120,4 135,18 200,18 280,18 300,4 310,30 320,4 335,18 400,18 480,18 500,4 510,30 520,4 535,18 600,18 680,18 700,4 710,30 720,4 735,18 800,18"
					stroke="#00C8E8"
					stroke-width="1.5"
					stroke-linecap="round"
					stroke-linejoin="round"
					opacity="0.35" />
			</svg>
		</div>

		<!-- Quiz card -->
		<div id="quiz-screen" class="card">
			<div class="q-number" id="q-num">QUESTION 1</div>
			<div class="question" id="q-text"></div>
			<div class="options" id="options"></div>
			<div class="feedback" id="feedback"></div>
			<button class="btn-next" id="btn-next" onclick="nextQuestion()">Next Question →</button>
		</div>

		<!-- Results screen -->
		<div id="results">
			<div class="result-card">
				<span class="result-emoji" id="res-emoji">🎓</span>
				<div class="result-title" id="res-title">Quiz Complete!</div>
				<div class="result-sub" id="res-sub">Here are your results</div>
				<div class="result-stats">
					<div class="stat"><span class="stat-num c" id="res-c">0</span><span class="stat-label">✓ Correct</span></div>
					<div class="stat"><span class="stat-num w" id="res-w">0</span><span class="stat-label">✗ Wrong</span></div>
					<div class="stat"><span class="stat-num p" id="res-p">0%</span><span class="stat-label">Score</span></div>
				</div>
				<div class="grade-text" id="grade-text"></div>
				<div class="grade-bar"><div class="grade-fill" id="grade-fill" style="width: 0%"></div></div>
				<button class="btn-restart" onclick="restart()">🔄 Restart Quiz</button>
			</div>
		</div>

		<script src="script.js"></script>
	</body>
</html>
